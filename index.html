<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Artist Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Music Artist Explorer</h1>
    </header>

    <main>
        <!-- Search Section -->
        <section id="search-section">
            <input id="artistInput" type="text" placeholder="Enter artist name">
            <button onclick="searchArtist()">Search</button>
        </section>

        <!-- Results Section -->
        <section id="result">
            <!-- Results will be dynamically rendered here -->
        </section>

        <!-- Favorites Section -->
        <section id="favorites-container">
            <h2>Favorite Artists</h2>
            <div id="favorites-list">
                <!-- Favorite artist cards will be dynamically rendered here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
